# config_multilang.yaml
# 多语言唤醒词训练 — hi hotel / 你好酒店 / 你好酒店(粤) / 안녕 호텔(韩)
model_name: "hi_hotel_multilang_10k"
output_dir: "./trained_models"

tts_settings:
  length_scales: [0.85, 0.95, 1.05, 1.15]
  noise_scales: [0.4, 0.55, 0.667, 0.8]
  noise_w_scales: [0.6, 0.8, 1.0]

positive_data_path: "./data/positive"
negative_data_path: "./data/negative"

background_paths:
  - "SonicWeave-v2/part1"
  - "SonicWeave-v2/part2"
  - "SonicWeave-v2/part3"
rir_paths: []

model_type: "dnn"
layer_size: 48
n_blocks: 4
embedding_dim: 128
dropout_prob: 0.35

num_workers: 0
steps: 50000
stabilization_steps: 20000

optimizer_type: "adamw"
learning_rate_max: 0.0008
lr_scheduler_type: "onecycle"
weight_decay: 0.01

batch_composition:
  # 1:2:2 ratio — 20% positive, 40% adversarial, 40% background (ACAV100M)
  t: 60      # positive (20%)
  n: 100     # adversarial TTS (40%)
  hn: 20     # adversarial phoneme-hard (40%)
  acav: 120  # background: ACAV100M (~2000 hrs speech/noise/music)

feature_manifest:
  targets:
    t: "./trained_models/hi_hotel_multilang_10k/features/positive_features.npy"
  negatives:
    acav: "openwakeword_features_ACAV100M_2000_hrs_16bit.npy"
    n: "./trained_models/hi_hotel_multilang_10k/features/negative_features.npy"
    hn: "./trained_models/hi_hotel_multilang_10k/features/hard_negative_features.npy"
  targets_val:
    t_v: "./trained_models/hi_hotel_multilang_10k/features/positive_features_val.npy"
  negatives_val:
    bv: "RACON_11h_v1.npy"

data_generation_tasks:
  # ===== 正样本：4 语种全部输出到 data/positive/ =====
  - name: "EN Positive"
    enabled: true
    output_dir: "data/positive"
    num_samples: 3000
    file_prefix: "en_pos"
    text_source:
      type: "fixed_phrase"
      phrase: "hello Ava"

  - name: "ZH Positive"
    enabled: false
    output_dir: "data/positive"
    num_samples: 1500
    file_prefix: "zh_pos"
    text_source:
      type: "fixed_phrase"
      phrase: "你好酒店"
    tts_settings:
      models: "zh_CN-huayan-medium"

  - name: "YUE Positive"
    enabled: false
    output_dir: "data/positive"
    num_samples: 1500
    file_prefix: "yue_pos"
    text_source:
      type: "fixed_phrase"
      phrase: "你好酒店"
    tts_settings:
      engine: "aliyun_tts"
      lang_code: "yue"
      voice: "Kiki"

  - name: "KO Positive"
    enabled: false
    output_dir: "data/positive"
    num_samples: 1500
    file_prefix: "ko_pos"
    text_source:
      type: "fixed_phrase"
      phrase: "안녕 호텔"
    tts_settings:
      engine: "aliyun_tts"
      lang_code: "ko"
      voice: "Sohee"

  # ===== 负样本：全部输出到 data/negative/ =====
  - name: "EN Adversarial"
    enabled: true
    output_dir: "data/negative"
    num_samples: 4000
    file_prefix: "neg_adv_en"
    text_source:
      type: "auto_adversarial"
      base_phrase: "hello Ava"
      multi_word_prob: 0

  - name: "EN Positive Val"
    enabled: true
    output_dir: "data/positive_val"
    num_samples: 400
    file_prefix: "en_pos_val"
    text_source:
      type: "fixed_phrase"
      phrase: "hello Ava"

  - name: "EN Phoneme Hard"
    enabled: true
    output_dir: "data/negative_phoneme"
    num_samples: 1500
    file_prefix: "neg_ph_en"
    text_source:
      type: "phoneme_adversarial"
      base_phrase: "hello Ava"
      min_distance: 0.3

  - name: "ZH Negatives"
    enabled: true
    output_dir: "data/negative"
    num_samples: 1500
    file_prefix: "neg_zh"
    text_source:
      type: "from_list"
      phrases:
        - "哈喽 艾娃"
        - "哈罗 爱娃"
        - "嗨喽 埃娃"
        - "海楼 阿娃"
        - "嘿咯 唉哇"
      repeat_each: 300
    tts_settings:
      models: "zh_CN-huayan-medium"

  - name: "YUE Negatives"
    enabled: false
    output_dir: "data/negative"
    num_samples: 1500
    file_prefix: "neg_yue"
    text_source:
      type: "from_list"
      phrases:
        - "早晨"
        - "多謝晒"
        - "唔該晒"
        - "聽日見"
        - "而家幾點"
      repeat_each: 300
    tts_settings:
      engine: "voxcpm"
      voice:
        - "A sweet young Cantonese woman, gentle and warm, like a close girlfriend chatting casually, slightly fast"
        - "A middle-aged Hong Kong man, humorous and street-smart, relaxed tone, normal speed"
        - "A teenage Cantonese girl, lively and energetic, bright and high-pitched voice, speaking quickly"
        - "An elderly Cantonese man, deep and slow voice, wise and calm, speaking deliberately"
        - "A young Cantonese office lady, soft and elegant, formal and polite tone, moderate pace"
        - "A Cantonese man in his thirties, confident and clear, professional tone, steady rhythm"
        - "A little Cantonese boy, childish and cute, high-pitched and excited, speaking fast"
        - "An old Cantonese grandmother, warm and kind, slightly hoarse, speaking slowly"
        - "A young Cantonese college student, casual and laid-back, slightly lazy tone, normal speed"
        - "A middle-aged Cantonese woman, sharp and loud, street vendor style, speaking rapidly"
        - "A Cantonese radio host, smooth and deep, very clear pronunciation, slow and measured"
        - "A teenage Cantonese boy, voice cracking slightly, playful and naughty, fast speech"
      speed: [1.5, 2.0, 2.5]

  - name: "KO Negatives"
    enabled: false
    output_dir: "data/negative"
    num_samples: 1500
    file_prefix: "neg_ko"
    text_source:
      type: "from_list"
      phrases:
        - "감사합니다"
        - "잠깐만요"
        - "오늘 뭐해"
        - "밥 먹었어"
        - "괜찮아요"
      repeat_each: 300
    tts_settings:
      engine: "voxcpm"
      voice:
        - "A young Korean woman, gentle and warm, like a caring older sister, natural pace"
        - "A young Korean man, friendly and cheerful, bright tone, normal speed"
        - "A middle-aged Korean woman, mature and elegant, formal polite speech, slow and clear"
        - "An elderly Korean man, deep and slow, wise and grandfatherly, speaking heavily"
        - "A teenage Korean girl, bright and energetic, casual and playful, speaking fast"
        - "A Korean man in his thirties, confident and clear, professional business tone, steady"
        - "A little Korean boy, childish and cute, high-pitched and excited, very fast speech"
        - "An old Korean grandmother, warm and kind, slightly trembling voice, speaking slowly"
        - "A young Korean student, shy and soft-spoken, hesitating slightly, moderate pace"
        - "A middle-aged Korean man, rough and loud, street-style, speaking rapidly and casually"
        - "A Korean news anchor, smooth and authoritative, very clear pronunciation, measured pace"
        - "A teenage Korean boy, rebellious and cool, lazy tone, slow and relaxed speech"
      speed: [1.5, 2.0, 2.5]

feature_generation_manifest:
  pos_feature:
    input_audio_dirs: ["./data/positive"]
    output_filename: "positive_features.npy"
    use_background_noise: true
    augmentation_rounds: 10
  pos_val_feature:
    input_audio_dirs: ["./data/positive_val"]
    output_filename: "positive_features_val.npy"
    use_background_noise: true
    augmentation_rounds: 1
  neg_feature_1:
    input_audio_dirs: ["./data/negative"]
    output_filename: "negative_features.npy"
    use_background_noise: true
    augmentation_rounds: 10
  neg_feature_2:
    input_audio_dirs: ["./data/negative_phoneme"]
    output_filename: "hard_negative_features.npy"
    use_background_noise: true
    augmentation_rounds: 1

distillation:
  enabled: true
  steps: 6000
  temperature: 4.0
  alpha: 0.7
  learning_rate: 0.0005
  student_layer_size: 8
  student_n_blocks: 1
  student_embedding_dim: 8

generate_clips: false
transform_clips: false
train_model: true
overwrite: false
